# Upwork scanner stack: FlareSolverr + 9Router + Python crawler
#
# Chuan bi:
#   cp .env.example .env
#   # Dien TELEGRAM_BOT_TOKEN, UPWORK_SEARCH_KEYWORD, NINEROUTER_MODEL (va/hoac Gemini/OpenRouter neu can)
#   # Model/key 9Router: dat trong .env (NINEROUTER_MODEL, NINEROUTER_API_KEY). Compose chi ghi de BASE_URL -> ninerouter:20128
#   # 9Router: bien ghi de trong `ninerouter.environment` hoac file `.env` goc (NINEROUTER_*), xem 9router/README.md
#
# Chay:
#   docker compose up -d --build
#
# Luu y: volume crawler_auth gan /app/.auth — giu storage_state.json sau restart.
# Neu truoc day khong co volume nay, moi lan start container moi phai login lai.
#
# Truy cap:
#   FlareSolverr: http://localhost:8191
#   9Router:      http://localhost:20128
#
services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: upwork-flaresolverr
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info
    restart: unless-stopped

  # Image: https://github.com/users/decolua/packages/container/package/9router — can pin tag (e.g. :3cf900a) instead of :latest
  ninerouter:
    image: ghcr.io/decolua/9router:latest
    container_name: upwork-ninerouter
    environment:
      # DATA_DIR: volume ninerouter_data -> /app/data (khong dung ~/.9router trong image)
      DATA_DIR: /app/data
      PORT: "20128"
      NODE_ENV: production
      JWT_SECRET: ${NINEROUTER_JWT_SECRET:-change-me-to-a-long-random-secret}
      INITIAL_PASSWORD: ${NINEROUTER_INITIAL_PASSWORD:-change-me}
      API_KEY_SECRET: ${NINEROUTER_API_KEY_SECRET:-endpoint-proxy-api-key-secret}
      MACHINE_ID_SALT: ${NINEROUTER_MACHINE_ID_SALT:-endpoint-proxy-salt}
      ENABLE_REQUEST_LOGS: "false"
      OBSERVABILITY_ENABLED: "true"
      AUTH_COOKIE_SECURE: "false"
      REQUIRE_API_KEY: "false"
      BASE_URL: ${NINEROUTER_APP_BASE_URL:-http://localhost:20128}
      CLOUD_URL: ${NINEROUTER_CLOUD_URL:-https://9router.com}
      NEXT_PUBLIC_BASE_URL: ${NINEROUTER_NEXT_PUBLIC_BASE_URL:-http://localhost:20128}
      NEXT_PUBLIC_CLOUD_URL: ${NINEROUTER_NEXT_PUBLIC_CLOUD_URL:-https://9router.com}
    ports:
      - "20128:20128"
    volumes:
      - ninerouter_data:/app/data
    restart: unless-stopped

  crawler:
    build:
      context: .
      dockerfile: Dockerfile.crawler
    container_name: upwork-crawler
    # Playwright/Chromium: avoid crashes when headless (can be removed depending on the device)
    shm_size: "1gb"
    env_file:
      - .env
    environment:
      # Noi bo Docker — ghi de FLARESOLVERR_URL trong .env (localhost khong dung trong mang container)
      FLARESOLVERR_URL: http://flaresolverr:8191
      # BASE_URL bat buoc host noi bo; MODEL + API_KEY lay tu file .env cung thu muc (thay the ${...})
      NINEROUTER_BASE_URL: http://ninerouter:20128
      NINEROUTER_MODEL: ${NINEROUTER_MODEL:-cc/claude-opus-4-6}
      NINEROUTER_API_KEY: ${NINEROUTER_API_KEY:-sk_9router}
      SEEN_STORE_PATH: /app/data/.seen_jobs.json
      TELEGRAM_SUBSCRIBERS_STORE_PATH: /app/data/.telegram_subscribers.json
      # Duplicate volume below — login save storage_state.json; no mount = every time the container recreates, you have to login again
      UPWORK_AUTH_DIR: /app/.auth
      LOG_DIR: /app/logs
      UPWORK_LOG_DIR: /app/logs
    volumes:
      - crawler_data:/app/data
      - crawler_auth:/app/.auth
      - ./logs:/app/logs
      # Logs persist ra host: ./logs
      # Optional: replace volume with host directory (easy to edit bearer) — mkdir .auth first
      # - ./.auth:/app/.auth
      # Neu dung Gemini + file key: tao api_key_gemini.txt roi bo comment dong duoi
      # - ./api_key_gemini.txt:/app/api_key_gemini.txt:ro
    depends_on:
      - flaresolverr
      - ninerouter
    restart: unless-stopped

volumes:
  ninerouter_data:
  crawler_data:
  crawler_auth:
